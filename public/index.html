<!doctype html>
<html>
  <head>
    <title>OSW</title>
    <link rel="icon" href="Penguin.png" />
    <style>
      body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        background-size: cover;
        background-position: center;
        transition: background-image 0.5s ease-in-out;
        overflow: hidden;
        background-image: url('default.png');
      }

      body::before {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        top: 0;
        left: 0;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        backdrop-filter: blur(15px);
        background: rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 20px;
        width: 350px;
        text-align: center;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      h1 {
        margin-bottom: 20px;
        font-weight: 600;
      }

      input {
        width: 70%;
        padding: 10px;
        border: none;
        border-radius: 10px;
        outline: none;
        font-size: 16px;
      }

      button {
        padding: 10px 15px;
        border: none;
        border-radius: 10px;
        background: #4facfe;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        color: white;
        font-size: 16px;
        cursor: pointer;
        margin-left: 5px;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.05);
        opacity: 0.9;
      }

      .weather-box {
        margin-top: 25px;
        font-size: 18px;
      }

      .weather-box h2 {
        margin-bottom: 10px;
      }

      .weather-box p {
        margin: 5px 0;
        opacity: 0.9;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1 style="color: orange; font-size: 50px">OSW</h1>
      <h1><span style="color: rgb(255, 204, 109)">🌤</span> Weather App</h1>

      <div>
        <input type="text" id="cityInput" placeholder="Enter city..." />
        <button onclick="getWeather()">Search</button>
      </div>

      <div class="weather-box" id="weatherBox"></div>
    </div>

    <script>
      const images = [
        'default.png',
        'sunny.png',
        'cloudy.png',
        'rainy.png',
        'night.png',
        'night_rainy.png',
        'cold.png',
        'night_hot.png',
      ];

      images.forEach((src) => {
        const img = new Image();
        img.src = src;
      });
      
      async function getWeather() {
        const city = document.getElementById('cityInput').value.trim();

        if (!city) {
          alert('Please enter a city name!');
          return;
        }

        try {
          const res = await fetch(
            `https://weather-api-production-e2df.up.railway.app/weather?city=${city}`,
          );

          if (!res.ok) {
            const errorData = await res.json();
            alert(errorData.message || 'City not found!');
            document.getElementById('weatherBox').innerHTML = '';
            document.body.style.backgroundImage = "url('default.png')";
            return;
          }

          const data = await res.json();

          document.getElementById('weatherBox').innerHTML = `
      <h2>${city}</h2>
      <p>${data.description}</p>
      <p>🌡 Temp: ${data.temperature} °C</p>
      <p>💧 Humidity: ${data.humidity}</p>
      <p>🌧 Rain: ${data.rainProbability}%</p>
      <p>🕒 Time: ${data.time}</p>
    `;
          setBackground(data);
        } catch (err) {
          console.error(err);
          alert('Failed to fetch weather. Please try again!');
          document.getElementById('weatherBox').innerHTML = '';
          document.body.style.backgroundImage = "url('default.png')";
        }
      }

      function setBackground(data) {
        const desc = data.description.toLowerCase();
        const rain = data.rainProbability;
        const temp = parseFloat(data.temperature);

        const [hours, minutes] = data.time.split(':').map(Number);
        const time = hours + minutes / 60;

        let timeState;

        if (time >= 6.5 && time < 17) timeState = 'day';
        else if ((time >= 17 && time < 18.5) || (time >= 5 && time < 6.5))
          timeState = 'sunset';
        else timeState = 'night';

        let bg = 'default.png';

        if (rain > 75 && timeState === 'sunset') bg = 'rainy.png';
        else if (rain > 75 && timeState === 'day') bg = 'sunny.png';
        else if (rain > 75 && timeState === 'night') bg = 'night_rainy.png';
        else if (
          (rain < 75 && desc.includes('cloud')) ||
          timeState === 'sunset'
        )
          bg = 'cloudy.png';
        else if (temp < 15 && timeState === 'day') bg = 'cold.png';
        else if (temp < 15 && timeState === 'night') bg = 'night.png';
        else if (temp >= 15 && timeState === 'day') bg = 'sunny.png';
        else if (temp >= 15 && timeState === 'night') bg = 'night_hot.png';

        document.body.style.backgroundImage = `url('${bg}')`;
      }
    </script>
  </body>
</html>
